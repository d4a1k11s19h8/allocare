services:
  - type: web
    name: allocare-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: cd backend && pip install -r requirements-render.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEPLOYMENT
        value: render
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
