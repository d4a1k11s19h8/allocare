name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 10 minutes (cron syntax)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: curl -s https://allocare-backend.onrender.com/api/health > /dev/null
        
      - name: Log status
        run: echo "Successfully pinged backend to prevent sleep."
